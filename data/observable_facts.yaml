meta:
  description: Observable and near-observable facts for the TAST physical/structural floor. These are
    the statements closest to clear observables that survive maximal skepticism of administrative head-counts.
    Confidence scores are transparent and provisional.
  rule: Administrative national totals are not listed here as facts. Physical presence, structural silence,
    legal regime, and genealogical termination patterns are prioritized.
  confidence_note: confidence ∈ [0,1]. Values ≥ 0.85 are treated as high-confidence observables for floor
    purposes. All remain open to revision with new primary evidence.
